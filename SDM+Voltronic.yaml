# =====================================================
# PROJECT
# =====================================================

esphome:
  name: energymonitor
  friendly_name: Energy Monitor

esp32:
  board: esp32dev
  framework:
    type: arduino

# =====================================================
# CORE
# =====================================================

logger:
  baud_rate: 0
  level: DEBUG

ota:
  - platform: esphome
    password: "Castro360928"

api:
# =====================================================
# WIFI
# =====================================================

wifi:
  ssid: "CastroNet"
  password: "castroeribas"

  ap:
    ssid: "EnergyMonitor Fallback"
    password: "Castro360928"

captive_portal:

web_server:
  port: 80

status_led:
  pin: GPIO02

# =====================================================
# INTERVALO CONFIGURÁVEL
# =====================================================

number:
  - platform: template
    name: "Intervalo leitura sensores (min)"
    id: intervalo_leitura
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 1
    optimistic: true

button:
  - platform: template
    name: "Atualizar sensores agora"
    on_press:
      then:
        - component.update: sdm

# =====================================================
# UART
# =====================================================

uart:

  # RS485 SDM630
  - id: uart_sdm
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 2400
    parity: EVEN
    stop_bits: 1

  # PIPSOLAR
  - id: uart_pipsolar
    tx_pin: GPIO27
    rx_pin: GPIO26
    baud_rate: 2400

# =====================================================
# MODBUS SDM630
# =====================================================

modbus:
  - id: modbus_sdm
    uart_id: uart_sdm
    send_wait_time: 200ms
    flow_control_pin: GPIO4

modbus_controller:
  - id: sdm
    modbus_id: modbus_sdm
    address: 1
    update_interval: 10s

# =====================================================
# PIPSOLAR
# =====================================================

pipsolar:
  - id: inverter0
    uart_id: uart_pipsolar
    update_interval: 2s

# =====================================================
# SENSORES
# =====================================================

sensor:

# =====================================================
# SDM630 TRIFÁSICO
# =====================================================

# Tensões

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Voltage L1"
    address: 0x0000
    register_type: read
    value_type: FP32
    unit_of_measurement: "V"

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Voltage L2"
    address: 0x0002
    register_type: read
    value_type: FP32
    unit_of_measurement: "V"

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Voltage L3"
    address: 0x0004
    register_type: read
    value_type: FP32
    unit_of_measurement: "V"

# Correntes

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Current L1"
    address: 0x0006
    register_type: read
    value_type: FP32
    unit_of_measurement: "A"

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Current L2"
    address: 0x0008
    register_type: read
    value_type: FP32
    unit_of_measurement: "A"

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Current L3"
    address: 0x000A
    register_type: read
    value_type: FP32
    unit_of_measurement: "A"

# Potência ativa

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Active Power L1"
    address: 0x000C
    register_type: read
    value_type: FP32
    unit_of_measurement: "W"

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Active Power L2"
    address: 0x000E
    register_type: read
    value_type: FP32
    unit_of_measurement: "W"

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Active Power L3"
    address: 0x0010
    register_type: read
    value_type: FP32
    unit_of_measurement: "W"

# Potência total

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Total Active Power"
    address: 0x0034
    register_type: read
    value_type: FP32
    unit_of_measurement: "W"

# Frequência

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Frequency"
    address: 0x0046
    register_type: read
    value_type: FP32
    unit_of_measurement: "Hz"

# Energia

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Import Active Energy"
    address: 0x0048
    register_type: read
    value_type: FP32
    unit_of_measurement: "kWh"

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Export Active Energy"
    address: 0x004A
    register_type: read
    value_type: FP32
    unit_of_measurement: "kWh"

  - platform: modbus_controller
    modbus_controller_id: sdm
    name: "SDM Total Active Energy"
    address: 0x0156
    register_type: read
    value_type: FP32
    unit_of_measurement: "kWh"

# =====================================================
# SENSORES PIPSOLAR COMPLETOS
# =====================================================

  - platform: pipsolar
    pipsolar_id: inverter0

    # QPIRI
    grid_rating_voltage:
      name: "${name} grid_rating_voltage"
    grid_rating_current:
      name: "${name} grid_rating_current"
    ac_output_rating_voltage:
      name: "${name} ac_output_rating_voltage"
    ac_output_rating_frequency:
      name: "${name} ac_output_rating_frequency"
    ac_output_rating_current:
      name: "${name} ac_output_rating_current"
    ac_output_rating_apparent_power:
      name: "${name} ac_output_rating_apparent_power"
    ac_output_rating_active_power:
      name: "${name} ac_output_rating_active_power"
    battery_rating_voltage:
      name: "${name} battery_rating_voltage"
    battery_recharge_voltage:
      name: "${name} battery_recharge_voltage"
    battery_under_voltage:
      name: "${name} battery_under_voltage"
    battery_bulk_voltage:
      name: "${name} battery_bulk_voltage"
    battery_float_voltage:
      name: "${name} battery_float_voltage"
    battery_type:
      name: "${name} battery_type"
    current_max_ac_charging_current:
      name: "${name} current_max_ac_charging_current"
    current_max_charging_current:
      name: "${name} current_max_charging_current"
    input_voltage_range:
      name: "${name} input_voltage_range"
    output_source_priority:
      name: "${name} output_source_priority"
    charger_source_priority:
      name: "${name} charger_source_priority"
    parallel_max_num:
      name: "${name} parallel_max_num"
    machine_type:
      name: "${name} machine_type"
    topology:
      name: "${name} topology"
    output_mode:
      name: "${name} output_mode"
    battery_redischarge_voltage:
      name: "${name} battery_redischarge_voltage"
    pv_ok_condition_for_parallel:
      name: "${name} pv_ok_condition_for_parallel"
    pv_power_balance:
      name: "${name} pv_power_balance"

    # QPIGS
    grid_voltage:
      name: "${name} grid_voltage"
    grid_frequency:
      name: "${name} grid_frequency"
    ac_output_voltage:
      name: "${name} ac_output_voltage"
    ac_output_frequency:
      name: "${name} ac_output_frequency"
    ac_output_apparent_power:
      name: "${name} ac_output_apparent_power"
    ac_output_active_power:
      name: "${name} ac_output_active_power"
    output_load_percent:
      name: "${name} output_load_percent"
    bus_voltage:
      name: "${name} bus_voltage"
    battery_voltage:
      name: "${name} battery_voltage"
    battery_charging_current:
      name: "${name} battery_charging_current"
    battery_capacity_percent:
      name: "${name} battery_capacity_percent"
    inverter_heat_sink_temperature:
      name: "${name} inverter_heat_sink_temperature"
    pv_input_current_for_battery:
      name: "${name} pv_input_current_for_battery"
    pv_input_voltage:
      name: "${name} pv_input_voltage"
    battery_voltage_scc:
      name: "${name} battery_voltage_scc"
    battery_discharge_current:
      name: "${name} battery_discharge_current"
    battery_voltage_offset_for_fans_on:
      name: "${name} battery_voltage_offset_for_fans_on"
    pv_charging_power:
      name: "${name} pv_charging_power"

# =====================================================
# TEXT SENSOR
# =====================================================

text_sensor:
  - platform: pipsolar
    pipsolar_id: inverter0
    device_mode:
      name: "${name} device_mode"
      filters:
        map:
          - P -> Power on mode
          - S -> Standby mode
          - L -> Line mode
          - B -> Battery mode
          - F -> Fault mode
          - D -> Shutdown mode"

# =====================================================
# BINARY SENSOR
# =====================================================

binary_sensor:
  - platform: pipsolar
    pipsolar_id: inverter0
    add_sbu_priority_version:
      name: "${name} add_sbu_priority_version"
    configuration_status:
      name: "${name} configuration_status"
    load_status:
      name: "${name} load_status"
    battery_voltage_to_steady_while_charging:
      name: "${name} battery_voltage_to_steady_while_charging"
    charging_status:
      name: "${name} charging_status"
    scc_charging_status:
      name: "${name} scc_charging_status"
    ac_charging_status:
      name: "${name} ac_charging_status"
    charging_to_floating_mode:
      name: "${name} charging_to_floating_mode"
    switch_on:
      name: "${name} switch_on"
    silence_buzzer_open_buzzer:
      name: "${name} silence_buzzer_open_buzzer"
    overload_bypass_function:
      name: "${name} overload_bypass_function"
    lcd_escape_to_default:
      name: "${name} lcd_escape_to_default"
    overload_restart_function:
      name: "${name} overload_restart_function"
    over_temperature_restart_function:
      name: "${name} over_temperature_restart_function"

# =====================================================
# SWITCHES
# =====================================================

switch:
  - platform: pipsolar
    pipsolar_id: inverter0
    output_source_priority_utility:
      name: "${name} output_source_priority_utility"
    output_source_priority_solar:
      name: "${name} output_source_priority_solar"
    output_source_priority_battery:
      name: "${name} output_source_priority_battery"
    input_voltage_range:
      name: "${name} input_voltage_range"
    pv_ok_condition_for_parallel:
      name: "${name} pv_ok_condition_for_parallel"
    pv_power_balance:
      name: "${name} pv_power_balance"
# =====================================================
# OUTPUT
# =====================================================

output:
  - platform: pipsolar
    pipsolar_id: inverter0
    battery_recharge_voltage:
      id: inverter0_battery_recharge_voltage_out